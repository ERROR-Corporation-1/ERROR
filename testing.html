<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERROR Corporation | Main Hub</title>

<link rel="icon" type="image/png" href="assets/ERROR Logo 2.png">

<style>

/* GLOBAL */
*{
  box-sizing:border-box;
  font-family:"Arial Rounded MT Bold", Arial, sans-serif;
}

body{
  margin:0;
  color:white;
  background:#000;
  overflow-x:hidden;
  cursor:none;
}

/* BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,.04), rgba(0,0,0,.96));
  z-index:1;
}

/* TOP BUBBLE BAR (NO LINKS NOW) */
.topbar{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 26px;
  z-index:10;

  background:rgba(255,255,255,.07);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.13);
  border-radius:999px;

  box-shadow:
  0 0 20px rgba(255,255,255,.08),
  inset 0 0 12px rgba(255,255,255,.03);

  font-size:.95rem;
  opacity:.9;
}

/* HEADER */
header{
  text-align:center;
  margin-top:115px;
  position:relative;
  z-index:2;
}

header img{
  height:180px;
  width:auto;
  border-radius:50%;

  box-shadow:
  0 0 25px rgba(255,255,255,.14),
  0 0 60px rgba(255,255,255,.06);
}

/* SUBTITLE */
.subtitle{
  text-align:center;
  margin:18px 0 38px;
  opacity:.65;
  letter-spacing:.4px;
  position:relative;
  z-index:2;
}

/* PANELS */
.panel{
  width:320px;
  max-width:92%;
  margin:20px auto;
  padding:30px;
  text-align:center;
  position:relative;
  z-index:2;

  background:rgba(255,255,255,.055);
  backdrop-filter:blur(26px);
  border:1px solid rgba(255,255,255,.13);
  border-radius:28px;

  box-shadow:
  0 0 24px rgba(255,255,255,.08),
  inset 0 0 14px rgba(255,255,255,.02);

  transition:.35s ease;
}

.panel:hover{
  transform:translateY(-7px) scale(1.015);
  box-shadow:
  0 0 35px rgba(255,255,255,.14),
  inset 0 0 18px rgba(255,255,255,.03);
}

/* BUTTONS */
button{
  border:none;
  padding:11px 18px;
  border-radius:16px;
  color:white;
  cursor:pointer;
  margin-top:10px;
  transition:.3s;

  background:rgba(255,255,255,.08);
  backdrop-filter:blur(18px);

  box-shadow:0 0 14px rgba(255,255,255,.06);
}

button:hover{
  background:rgba(255,255,255,.14);
  box-shadow:0 0 20px rgba(255,255,255,.12);
}

/* PROJECT GRID */
.projects{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:0 15px;
  position:relative;
  z-index:2;
}

/* FOOTER */
footer{
  text-align:center;
  margin:55px 0 20px;
  opacity:.45;
  font-size:.8rem;
  position:relative;
  z-index:2;
}

/* CURSOR TRAIL */
.trail{
  position:fixed;
  width:8px;
  height:8px;
  background:white;
  border-radius:4px;
  opacity:.75;
  pointer-events:none;
  z-index:9999;
  box-shadow:0 0 10px rgba(255,255,255,.6);
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="topbar">
ERROR Corporation
</div>

<header>
<img src="assets/ERROR Logo 1.png" alt="ERROR Logo">
</header>

<div class="subtitle">
Connecting All Systems & Projects
</div>

<!-- MAIN PANEL -->
<div class="panel">
<p><strong>Welcome to ERROR Corporation</strong></p>
<p>Your central hub for all projects, systems, and experiments.</p>
<button onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">
Explore
</button>
</div>

<!-- PROJECTS -->
<div class="projects">

<div class="panel">
<p><strong>ERROR MC</strong></p>
<p>Active Project</p>
</div>

<div class="panel">
<p><strong>Official Hoodie</strong></p>
<p>ERROR Corporation Merch</p>
<button onclick="window.open('https://www.customink.com/designs/ERROR%20Official%20Hoodie/bbc0-00d2-3tuy/share?pc=EMAIL-40778&utm_campaign=shared%20design&utm_source=share%20link&utm_medium=shared%20design&utm_content=shared%20desktop')">
View Hoodie
</button>
</div>

<div class="panel">
<p><strong>Future Projects</strong></p>
<p>Coming Soon</p>
</div>

</div>

<footer>
© 2026 ERROR Corporation
</footer>

<script>

/* BACKGROUND EFFECT */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const chars=["●","◦","▪","▫","·"];
const fontSize=16;
let columns=Math.floor(innerWidth/fontSize);
let drops=Array(columns).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="rgba(255,255,255,.45)";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>.975){
      drops[i]=0;
    }
    drops[i]++;
  }
}
setInterval(draw,40);

/* CURSOR TRAIL */
const trail=[];

document.addEventListener("mousemove",e=>{
  const t=document.createElement("div");
  t.className="trail";
  t.style.left=e.clientX+"px";
  t.style.top=e.clientY+"px";
  document.body.appendChild(t);

  trail.push({el:t,life:1});
});

function animate(){
  trail.forEach((t,i)=>{
    t.life-=0.03;
    t.el.style.opacity=t.life;
    t.el.style.transform=`scale(${t.life})`;

    if(t.life<=0){
      t.el.remove();
      trail.splice(i,1);
    }
  });

  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
