<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERROR Corporation | Main Hub</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="assets/ERROR Logo 2.png">

<style>
/* GLOBAL FONT */
body, header, .navbar a, .panel, .subtitle, footer, button {
  font-family: "Arial Rounded MT Bold", Arial, sans-serif;
}

body {
  margin: 0;
  color: #ffffff;
  overflow-x: hidden;
  cursor: none;
  background: #000;
}

/* BACKGROUND CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.03), rgba(0,0,0,0.95));
  z-index: 1;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 10px 25px;
  display: flex;
  gap: 20px;
  z-index: 10;
}

.navbar a {
  text-decoration: none;
  color: white;
  font-size: 0.9rem;
  opacity: 0.7;
  transition: 0.3s;
}

.navbar a:hover {
  opacity: 1;
}

/* HEADER */
header {
  text-align: center;
  margin-top: 110px;
  position: relative;
  z-index: 2;
}

/* LOGO */
header img {
  height: 180px;
  width: auto;
  margin-bottom: 15px;
  border-radius: 50%;
  box-shadow: 0 0 25px rgba(255,255,255,0.18);
}

/* SUBTITLE */
.subtitle {
  text-align: center;
  opacity: 0.6;
  margin-bottom: 40px;
  position: relative;
  z-index: 2;
}

/* GLASS PANELS (BUBBLES) */
.panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 30px;
  width: 320px;
  margin: 20px auto;
  text-align: center;
  position: relative;
  z-index: 2;

  /* SOFT WHITE GLOW */
  box-shadow: 0 0 20px rgba(255,255,255,0.12);

  transition: 0.3s;
}

.panel:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 30px rgba(255,255,255,0.18);
}

/* BUTTONS */
button {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 18px;
  border-radius: 15px;
  color: white;
  margin: 5px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: rgba(255,255,255,0.2);
}

/* PROJECTS */
.projects {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  position: relative;
  z-index: 2;
}

/* FOOTER */
footer {
  text-align: center;
  margin: 60px 0 20px;
  opacity: 0.5;
  font-size: 0.8rem;
  position: relative;
  z-index: 2;
}

/* CURSOR TRAIL */
.trail {
  position: fixed;
  width: 8px;
  height: 8px;
  background: white;
  opacity: 0.7;
  border-radius: 3px;
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#projects">Projects</a>
  <a href="#">Contact</a>
</div>

<header>
  <img src="assets/ERROR Logo 1.png" alt="ERROR Logo">
</header>

<div class="subtitle">Connecting All Systems & Projects</div>

<!-- MAIN PANEL -->
<div class="panel">
  <p><strong>Welcome to ERROR Corporation</strong></p>
  <p>Your central hub for all projects, systems, and experiments.</p>
  <button onclick="alert('Explore Projects')">Explore Projects</button>
</div>

<!-- PROJECTS -->
<div id="projects" class="projects">

  <div class="panel">
    <p>ERROR MC</p>
    <p>Active Project</p>
  </div>

  <div class="panel">
    <p>Legacy Systems</p>
    <p>Offline</p>
  </div>

  <div class="panel">
    <p>Experimental Labs</p>
    <p>Active</p>
  </div>

</div>

<footer>© 2026 ERROR Corporation</footer>

<script>
// BACKGROUND EFFECT (calm abstract matrix style)
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = ["●","◦","▪","▫","·"];
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 40);

// CURSOR TRAIL
const trail = [];

document.addEventListener("mousemove", e=>{
  const t = document.createElement("div");
  t.className = "trail";
  t.style.left = e.clientX + "px";
  t.style.top = e.clientY + "px";
  document.body.appendChild(t);

  trail.push({el:t, life:1});
});

function animate(){
  trail.forEach((t,i)=>{
    t.life -= 0.03;
    t.el.style.opacity = t.life;

    if(t.life <= 0){
      t.el.remove();
      trail.splice(i,1);
    }
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
