<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERROR AI</title>

<link rel="icon" type="image/png" href="assets/ERROR Logo 2.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
  cursor:none;
}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
  cursor:none;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.06), transparent 50%),
    linear-gradient(to bottom, rgba(255,255,255,.03), rgba(0,0,0,.96));
  z-index:0;
}

/* MAIN LAYOUT */
main{
  position:relative;
  z-index:2;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* CHAT CONTAINER */
.chat-container{
  flex:1;
  width:100%;
  max-width:1100px;
  margin:auto;
  display:flex;
  flex-direction:column;
  padding:110px 16px 24px;
}

/* CHAT BOX (IMPORTANT FIX: smooth scrolling) */
.chat-box{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:18px;
  padding-right:6px;
}

/* MESSAGES */
.message{
  max-width:78%;
  padding:16px 18px;
  border-radius:24px;
  line-height:1.5;
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.1);
  animation:fadeIn .25s ease;
}

.user{
  align-self:flex-end;
  background:rgba(255,255,255,.12);
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,.06);
}

/* INPUT AREA */
.input-area{
  margin-top:18px;
  display:flex;
  gap:12px;
}

.input-area input{
  flex:1;
  padding:16px 18px;
  border:none;
  outline:none;
  color:white;
  border-radius:22px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
}

.input-area button{
  border:none;
  color:white;
  padding:16px 24px;
  border-radius:22px;
  cursor:none;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.12);
}

/* CUSTOM CURSOR */
.cursor{
  position:fixed;
  width:18px;
  height:18px;
  border-radius:50%;
  pointer-events:none;
  z-index:2147483647;
  background:rgba(255,255,255,.9);
  transform:translate(-50%,-50%);
}

/* LOCK SCREEN */
#errorLock {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:10000;
}

#errorLock input {
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  margin-top:12px;
}

#errorLock button {
  margin-top:10px;
  padding:10px 16px;
  cursor:none;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="cursor"></div>

<!-- 🔥 LOCK SCREEN -->
<div id="errorLock">
  <h2>ERROR ACCESS REQUIRED</h2>
  <input type="password" id="errorPass" placeholder="Enter Code">
  <button onclick="checkErrorPass()">Unlock</button>
</div>

<main>

  <div class="chat-container">

    <div class="chat-box" id="chatBox">
      <div class="message ai">ERROR AI online. Ask anything.</div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask ERROR AI...">
      <button id="sendBtn">Send</button>
    </div>

  </div>

</main>

<script>

let isUnlocked = false;
let identity = "User"; // changes after unlock

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const lockScreen = document.getElementById("errorLock");

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* 🔥 TRIGGER LOCK */
function handleSpecial(message){
  if(message.trim() === "This is ERROR"){
    lockScreen.style.display = "flex";
    return true;
  }
  return false;
}

/* 🔥 PASSWORD CHECK */
function checkErrorPass(){
  const pass = document.getElementById("errorPass").value;

  if(pass === "1510"){
    isUnlocked = true;
    identity = "ERROR";

    lockScreen.style.display = "none";
    addMessage("ERROR MODE ACTIVATED", "ai");
  } else {
    alert("ACCESS DENIED");
  }
}

async function sendMessage(){

  const message = userInput.value.trim();
  if(!message) return;

  /* CHECK SPECIAL TRIGGER */
  if(handleSpecial(message)){
    userInput.value = "";
    return;
  }

  addMessage(message, "user");
  userInput.value = "";

  addMessage("ERROR AI is thinking...", "ai");
  const thinkingMessage = chatBox.lastElementChild;

  try{

    const response = await fetch("/api/ai", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ message })
    });

    const data = await response.json();

    /* 🔥 MODIFY RESPONSE BASED ON MODE */
    let reply = data.reply || "No response.";

    if(isUnlocked){
      reply = `[${identity}] ${reply}`;
    }

    thinkingMessage.textContent = reply;

  }
  catch(error){
    thinkingMessage.textContent = "ERROR AI connection failure.";
  }
}

sendBtn.addEventListener("click", sendMessage);

userInput.addEventListener("keypress", e=>{
  if(e.key === "Enter") sendMessage();
});

</script>

<script>
const cursor = document.querySelector(".cursor");

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let currentX = mouseX;
let currentY = mouseY;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animateCursor(){
  currentX += (mouseX - currentX) * 0.18;
  currentY += (mouseY - currentY) * 0.18;

  cursor.style.left = currentX + "px";
  cursor.style.top = currentY + "px";

  requestAnimationFrame(animateCursor);
}

animateCursor();
</script>

<script type="module">
import { loadToolbar } from "./js/toolbar.js";
loadToolbar();
</script>

</body>
</html>
