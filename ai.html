<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERROR AI</title>

<link rel="icon" type="image/png" href="assets/ERROR Logo 2.png">

<!-- FONT PRELOAD FIX -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">

<style>
/* =========================
   GLOBAL STABILITY FIX
========================= */

html, body {
  width: 100%;
  height: 100%;
  font-size: 16px;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
  overflow: hidden;

  /* FIX FLASH / MOBILE LOOK ISSUE */
  opacity: 0;
  animation: fadeInBody 0.25s forwards;

  font-family: "Orbitron", sans-serif;
}

@keyframes fadeInBody {
  to { opacity: 1; }
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,.06), transparent 50%),
    linear-gradient(to bottom, rgba(255,255,255,.03), rgba(0,0,0,.96));
  z-index: 0;
}

/* MAIN LAYOUT */
main {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.chat-container {
  flex: 1;
  width: 100%;
  max-width: 1100px;
  margin: auto;
  display: flex;
  flex-direction: column;
  padding: 110px 16px 24px;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding-right: 6px;
}

/* MESSAGES */
.message {
  max-width: 78%;
  padding: 16px 18px;
  border-radius: 24px;
  line-height: 1.5;
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,.1);
  animation: fadeIn .25s ease;
}

.user { align-self: flex-end; background: rgba(255,255,255,.12); }
.ai { align-self: flex-start; background: rgba(255,255,255,.06); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* INPUT */
.input-area {
  margin-top: 18px;
  display: flex;
  gap: 12px;
}

.input-area input {
  flex: 1;
  padding: 16px 18px;
  border: none;
  outline: none;
  color: white;
  border-radius: 22px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
}

.input-area button {
  padding: 16px 24px;
  border-radius: 22px;
  cursor: pointer;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.12);
  color: white;
}

/* CURSOR */
.cursor {
  position: fixed;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  background: rgba(255,255,255,.9);
  box-shadow: 0 0 18px rgba(255,255,255,.75);
  transform: translate(-50%, -50%);
}

/* RESPONSIVE */
@media (max-width: 700px) {
  .message {
    max-width: 92%;
  }
}
</style>
</head>

<body>

<div class="cursor"></div>

<main>

  <div class="chat-container">

    <div class="chat-box" id="chatBox">
      <div class="message ai">ERROR AI online. Ask anything.</div>
    </div>

    <div class="input-area">
      <input id="userInput" placeholder="Ask ERROR AI...">
      <button id="sendBtn">Send</button>
    </div>

  </div>

</main>

<script>
/* =========================
   CHAT LOGIC
========================= */

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  userInput.value = "";

  addMessage("ERROR AI is thinking...", "ai");
  const thinking = chatBox.lastElementChild;

  try {
    const response = await fetch("/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await response.json();
    thinking.textContent = data.reply || "No response.";

  } catch (err) {
    thinking.textContent = "ERROR AI connection failure.";
  }
}

sendBtn.addEventListener("click", sendMessage);

userInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

<script>
/* =========================
   CURSOR FIXED ANIMATION
========================= */

const cursor = document.querySelector(".cursor");

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;
let currentX = mouseX;
let currentY = mouseY;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate() {
  currentX += (mouseX - currentX) * 0.18;
  currentY += (mouseY - currentY) * 0.18;

  cursor.style.left = currentX + "px";
  cursor.style.top = currentY + "px";

  requestAnimationFrame(animate);
}

animate();
</script>

<script type="module">
import { loadToolbar } from "./js/toolbar.js";
loadToolbar();
</script>

<script>
/* =========================
   FINAL LOAD FIX (CRITICAL)
========================= */

window.addEventListener("load", () => {
  document.body.style.opacity = "1";
});
</script>

</body>
</html>
