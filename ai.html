<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERROR AI</title>

<link rel="icon" type="image/png" href="assets/ERROR Logo 2.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Orbitron", sans-serif;
}

html, body{
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top, rgba(255,255,255,.06), transparent 50%),
  linear-gradient(to bottom, rgba(255,255,255,.03), rgba(0,0,0,.96));
}

main{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
}

.chat-container{
  width:100%;
  max-width:1100px;
  margin:auto;
  display:flex;
  flex-direction:column;
  height:100vh;
  padding:110px 16px 20px;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
  padding-right:6px;
}

.message{
  max-width:80%;
  padding:14px 16px;
  border-radius:18px;
  line-height:1.4;
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(12px);
  white-space:pre-wrap;
}

.user{
  align-self:flex-end;
  background:rgba(255,255,255,.12);
}

.ai{
  align-self:flex-start;
  background:rgba(255,255,255,.06);
}

.input-area{
  display:flex;
  gap:10px;
  margin-top:12px;
}

input{
  flex:1;
  padding:14px;
  border-radius:14px;
  border:none;
  outline:none;
  background:rgba(255,255,255,.08);
  color:white;
}

button{
  padding:14px 18px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,.12);
  color:white;
}
</style>
</head>

<body>

<main>

<div class="chat-container">

  <div class="chat-box" id="chatBox">
    <div class="message ai">ERROR AI online.</div>
  </div>

  <div class="input-area">
    <input id="userInput" placeholder="Ask ERROR AI...">
    <button id="sendBtn">Send</button>
  </div>

</div>

</main>

<script>
const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

let unlocked = false;
let errorMode = false;

function addMessage(text, type){
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function fakeCodeLines(){
  let output = "";
  for(let i=0;i<500;i++){
    output += `ERROR_LINE_${i}_${Math.random().toString(16).slice(2)}\n`;
  }
  return output;
}

function unlockScreen(){
  const pass = prompt("Enter ERROR Password:");
  if(pass === "1510"){
    unlocked = true;
    addMessage("ERROR MODE UNLOCKED", "ai");
  } else {
    addMessage("Wrong password.", "ai");
  }
}

async function sendMessage(){

  const msg = userInput.value.trim();
  if(!msg) return;

  addMessage(msg, "user");
  userInput.value = "";

  /* COMMAND: PASSWORD MODE */
  if(msg.toLowerCase() === "this is error"){
    errorMode = true;
    unlockScreen();
    return;
  }

  /* COMMAND: DOMAIN EXPANSION */
  if(msg.toLowerCase() === "domain expansion"){
    addMessage(fakeCodeLines(), "ai");
    return;
  }

  const thinking = document.createElement("div");
  thinking.className = "message ai";
  thinking.textContent = "ERROR AI is thinking...";
  chatBox.appendChild(thinking);
  chatBox.scrollTop = chatBox.scrollHeight;

  let systemPrefix = "";

  if(errorMode && unlocked){
    systemPrefix = "[ERROR OWNER MODE ACTIVE - Address user as ERROR/Kevin]";
  }

  try{
    const res = await fetch("/api/ai",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        message: systemPrefix + " " + msg
      })
    });

    const data = await res.json();
    thinking.textContent = data.reply || "No response";

  } catch(e){
    thinking.textContent = "ERROR AI connection failure.";
  }
}

sendBtn.onclick = sendMessage;

userInput.addEventListener("keypress", e=>{
  if(e.key === "Enter") sendMessage();
});

/* FIXED SCROLL (NO ZOOM FEELING) */
chatBox.addEventListener("wheel", (e)=>{
  chatBox.scrollTop += e.deltaY;
});
</script>

</body>
</html>
